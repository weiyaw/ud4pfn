defaults:
  - _self_

setup: "logistic-linear"
x_design: "uniform:-1:1"
x_rollout: "truth"
fix_data: True
shuffle_data: True

n_estimators: 1
n0: 25
n_grid_size: 30
n_horizon: 1000
outer_idx: 0
mc_delta: 100
seed: 999

id: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${id}/quasi setup=${setup} x_design=${x_design} x_rollout=${x_rollout} n_est=${n_estimators} n0=${n0} fix=${fix_data} seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .
