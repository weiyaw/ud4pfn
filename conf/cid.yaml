defaults:
  - _self_

n_estimators: 1
sample_idx: 0
n_grid_size: 101 # the number of points to evaluate F_n/Q_n
n_horizon: 1000
setup: "gaussian-linear" # "gaussian-linear", "probit-mixture" or "gamma"
data_size: 25
x_rollout: "truth"
seed: 999

id: ${now:%Y-%m-%d}
lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "./outputs/${id}/cid setup=${setup} n0=${data_size} x_rollout=${x_rollout} n_est=${n_estimators} seed=${seed}"
  sweep:
    dir: ${hydra.run.dir}
    subdir: .


