defaults:
  - _self_

id: ${now:%Y-%m-%d}
outputs_root: "./outputs"
include_regex: ".+"
bootstrap_samples: 1000
seed_offset: 10391
overwrite: false

lastrun: ${now:%Y-%m-%dT%H:%M:%S%z}
git: ${githash:}

hydra:
  run:
    dir: "${outputs_root}/${id}"

  sweep:
    dir: ${hydra.run.dir}
    subdir: .
